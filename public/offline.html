<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Center Auto Peças — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; background: #3b82f6; color: #fff; border: none; border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #2563eb; }
    .tip { margin-top: 2rem; padding: 1rem; background: #1e293b; border-radius: 0.75rem; text-align: left; }
    .tip h3 { font-size: 0.8rem; color: #60a5fa; margin-bottom: 0.5rem; }
    .tip ul { list-style: none; font-size: 0.8rem; color: #94a3b8; }
    .tip ul li { padding: 0.25rem 0; }
    .tip ul li::before { content: "✓ "; color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sem conexão</h1>
    <p>Você está offline. Verifique sua conexão com a internet e tente novamente.</p>
    <button class="btn" onclick="window.location.reload()">Tentar novamente</button>
    <div class="tip">
      <h3>Disponível offline:</h3>
      <ul>
        <li>Consulta de produtos (último cache)</li>
        <li>Consulta de clientes (último cache)</li>
        <li>Consulta de preços (último cache)</li>
      </ul>
    </div>
  </div>
</body>
</html>
